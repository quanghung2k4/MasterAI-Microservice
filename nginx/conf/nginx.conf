worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        # Lắng nghe port 8000
        listen       0.0.0.0:8000;
        server_name  localhost;

        #User Service
        location /api/users/ {
            proxy_pass http://127.0.0.1:3001/api/users/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Post Service
        location /api/posts/ {
            proxy_pass http://127.0.0.1:3002/api/posts/;
            proxy_set_header Host $host;
        }

        # AI Service
        location /api/ai/ {
            proxy_pass http://127.0.0.1:3003/api/ai/;
            proxy_set_header Host $host;
        }

        # Message Service
        location /ws/chat/ {
            proxy_pass http://127.0.0.1:3030;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}